services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hirestack
      POSTGRES_PASSWORD: hirestack
      POSTGRES_DB: hirestack
    ports:
      - "5436:5432"
    volumes:
      - hirestack_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hirestack
      MINIO_ROOT_PASSWORD: hirestack123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hirestack_minio:/data

volumes:
  hirestack_pgdata:
  hirestack_minio:
